name: Gemini Issue Triage
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: windows-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Run Gemini CLI
        # 🚩 THE FIX: Change @v1 to @v0.32.1
        uses: google-github-actions/run-gemini-cli@v0.32.1
        with:
          prompt: |
            Analyze and triage this issue.
            Title: "${{ github.event.issue.title }}"
            Body: "${{ github.event.issue.body }}"
          google_api_key: ${{ secrets.GEMINI_API_KEY }}
