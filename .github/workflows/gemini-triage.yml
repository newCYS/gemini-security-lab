name: Gemini Issue Triage
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: windows-latest
    permissions:
      contents: write
      issues: write
   steps:
      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_cli_version: 0.32.1
          # 🚩 THIS IS THE MISSING LINK:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }} 
          gemini_debug: true
          prompt: |
            You are a triage agent. Analyze this issue:
            Title: "${{ github.event.issue.title }}"
            Body: "${{ github.event.issue.body }}"
