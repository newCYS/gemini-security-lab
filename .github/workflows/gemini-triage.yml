name: Gemini Issue Triage
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: windows-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Run Gemini CLI
        # 🚩 FIX: Switch to a verified tag
        uses: google-github-actions/run-gemini-cli@v0.1.20 
        with:
          prompt: |
            Triage this issue.
            Title: "${{ github.event.issue.title }}"
            Body: "${{ github.event.issue.body }}"
          google_api_key: ${{ secrets.GEMINI_API_KEY }}
